version: '3.8'

# PostgreSQL development environment
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.postgres-dev.yml up

services:
  # Main application service - PostgreSQL development configuration
  bengkelin-api:
    environment:
      # Database Configuration for PostgreSQL
      - DATABASE_DRIVER=postgres
      - DATABASE_NAME=bengkelin_dev_db
      - DATABASE_USERNAME=bengkelin_dev_user
      - DATABASE_PASSWORD=bengkelin_dev_password
      - DATABASE_HOST=postgres-db
      - DATABASE_PORT=5432
      - POSTGRES_SSLMODE=disable
      - POSTGRES_TIMEZONE=Asia/Jakarta
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # PostgreSQL Database - development configuration
  postgres-db:
    image: postgres:15-alpine
    container_name: bengkelin-postgres-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=bengkelin_dev_db
      - POSTGRES_USER=bengkelin_dev_user
      - POSTGRES_PASSWORD=bengkelin_dev_password
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      - TZ=Asia/Jakarta
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - bengkelin-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bengkelin_dev_user -d bengkelin_dev_db"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c log_statement=all
      -c log_destination=stderr
      -c logging_collector=off
      -c log_min_messages=info

  # pgAdmin for PostgreSQL management (development only)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bengkelin-pgadmin
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@bengkelin.com
      - PGADMIN_DEFAULT_PASSWORD=admin123
      - PGADMIN_CONFIG_SERVER_MODE=False
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres-db
    networks:
      - bengkelin-network

  # Remove MySQL-specific services for PostgreSQL setup
  # phpmyadmin:
  #   profiles: ["mysql"]  # This prevents it from starting

volumes:
  postgres_dev_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  bengkelin-network:
    driver: bridge