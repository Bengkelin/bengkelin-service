# Development environment — PostgreSQL
# Usage: docker compose -f docker/docker-compose.dev.yml up

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile.dev
    container_name: bengkelin-app-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "2345:2345" # Delve debugger
    env_file:
      - ../.env
    environment:
      - SERVER_MODE=debug
      - SERVER_DEV_MODE=true
      - GIN_MODE=debug
      - DATABASE_DRIVER=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ..:/app:cached
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bengkelin-dev

  postgres:
    image: postgres:15-alpine
    container_name: bengkelin-postgres-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - ../.env
    environment:
      - POSTGRES_DB=${DATABASE_NAME:-bengkelin_db}
      - POSTGRES_USER=${DATABASE_USERNAME:-bengkelin_user}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-bengkelin_password}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      - TZ=Asia/Jakarta
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ../scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ../config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-bengkelin_user} -d ${DATABASE_NAME:-bengkelin_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c log_statement=all
      -c log_destination=stderr
    networks:
      - bengkelin-dev

  redis:
    image: redis:7-alpine
    container_name: bengkelin-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - bengkelin-dev

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bengkelin-pgadmin
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@bengkelin.com
      - PGADMIN_DEFAULT_PASSWORD=admin123
      - PGADMIN_CONFIG_SERVER_MODE=False
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - bengkelin-dev

volumes:
  postgres_dev_data:
  redis_dev_data:
  pgadmin_data:
  go_mod_cache:

networks:
  bengkelin-dev:
    driver: bridge
