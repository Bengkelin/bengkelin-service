# Production environment — PostgreSQL
# Usage: docker compose -f docker/docker-compose.prod.yml up -d
#
# Before first run:
#   1. Copy .env.example to .env and fill in production values
#   2. Place SSL certs in config/ssl/
#   3. Review resource limits below

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: bengkelin-app-prod
    restart: always
    env_file:
      - ../.env
    environment:
      - SERVER_MODE=release
      - SERVER_DEV_MODE=false
      - GIN_MODE=release
      - DATABASE_DRIVER=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ../public:/public:ro
      - app_logs:/var/log/bengkelin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - bengkelin-prod

  postgres:
    image: postgres:15-alpine
    container_name: bengkelin-postgres-prod
    restart: always
    env_file:
      - ../.env
    environment:
      - POSTGRES_DB=${DATABASE_NAME:-bengkelin_db}
      - POSTGRES_USER=${DATABASE_USERNAME:-bengkelin_user}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      - TZ=Asia/Jakarta
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ../scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ../config/postgresql-prod.conf:/etc/postgresql/postgresql.conf:ro
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-bengkelin_user} -d ${DATABASE_NAME:-bengkelin_db}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - bengkelin-prod

  redis:
    image: redis:7-alpine
    container_name: bengkelin-redis-prod
    restart: always
    volumes:
      - redis_prod_data:/data
      - ../config/redis-prod.conf:/usr/local/etc/redis/redis.conf:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - bengkelin-prod

  nginx:
    image: nginx:alpine
    container_name: bengkelin-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../config/nginx-prod.conf:/etc/nginx/nginx.conf:ro
      - ../config/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - bengkelin-prod

volumes:
  postgres_prod_data:
  redis_prod_data:
  app_logs:
  nginx_logs:

networks:
  bengkelin-prod:
    driver: bridge
