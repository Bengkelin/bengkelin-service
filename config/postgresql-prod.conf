# PostgreSQL production configuration for Bengkelin API
# Optimized for production workloads

# Connection Settings
listen_addresses = '*'
port = 5432
max_connections = 300
superuser_reserved_connections = 3

# Memory Settings (adjust based on available RAM)
shared_buffers = 512MB          # 25% of RAM for dedicated server
effective_cache_size = 2GB      # 75% of RAM
work_mem = 8MB                  # Per connection, be careful with high values
maintenance_work_mem = 128MB
autovacuum_work_mem = -1        # Use maintenance_work_mem

# WAL Settings
wal_level = replica
wal_buffers = 16MB
max_wal_size = 2GB
min_wal_size = 80MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min

# Query Planner
random_page_cost = 1.1          # For SSD storage
effective_io_concurrency = 200  # For SSD storage
seq_page_cost = 1.0
cpu_tuple_cost = 0.01
cpu_index_tuple_cost = 0.005
cpu_operator_cost = 0.0025

# Parallel Query
max_worker_processes = 8
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4

# Background Writer
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0
bgwriter_flush_after = 512kB

# Logging (production settings)
log_destination = 'stderr'
logging_collector = off
log_min_messages = warning
log_min_error_statement = error
log_min_duration_statement = 5000    # Log slow queries (5 seconds)
log_checkpoints = on
log_connections = off               # Disable in production for performance
log_disconnections = off            # Disable in production for performance
log_lock_waits = on
log_temp_files = 10MB              # Log temp files larger than 10MB
log_autovacuum_min_duration = 0
log_error_verbosity = default
log_statement = 'none'             # Don't log statements in production
log_timezone = 'Asia/Jakarta'

# Locale and Formatting
datestyle = 'iso, mdy'
timezone = 'Asia/Jakarta'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'

# Autovacuum (production tuning)
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s           # More frequent in production
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1    # More aggressive
autovacuum_analyze_scale_factor = 0.05  # More aggressive
autovacuum_freeze_max_age = 200000000
autovacuum_multixact_freeze_max_age = 400000000
autovacuum_vacuum_cost_delay = 10ms     # Faster vacuum
autovacuum_vacuum_cost_limit = 1000     # Higher limit

# Client Connection Defaults
search_path = '"$user", public'
default_tablespace = ''
temp_tablespaces = ''

# Lock Management
deadlock_timeout = 1s
max_locks_per_transaction = 64
max_pred_locks_per_transaction = 64

# Security (production)
ssl = on                           # Enable SSL in production
ssl_cert_file = 'server.crt'
ssl_key_file = 'server.key'
ssl_ca_file = ''
ssl_crl_file = ''
password_encryption = scram-sha-256
row_security = on

# Statement Timeout (prevent runaway queries)
statement_timeout = 300000         # 5 minutes
lock_timeout = 30000              # 30 seconds
idle_in_transaction_session_timeout = 600000  # 10 minutes

# Shared Preload Libraries
shared_preload_libraries = 'pg_stat_statements'

# Statistics
track_activities = on
track_counts = on
track_io_timing = on
track_functions = pl
stats_temp_directory = 'pg_stat_tmp'

# Other Performance Settings
synchronous_commit = on            # Ensure durability in production
fsync = on                        # Ensure durability in production
full_page_writes = on             # Ensure consistency
wal_compression = on              # Compress WAL files
wal_log_hints = off
hot_standby = on                  # For read replicas
max_standby_streaming_delay = 30s
wal_receiver_timeout = 60s
max_logical_replication_workers = 4
max_sync_workers_per_subscription = 2