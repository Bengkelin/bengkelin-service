version: '3.8'

# PostgreSQL variant of docker-compose
# Usage: docker-compose -f docker-compose.yml -f docker-compose.postgres.yml up

services:
  # Main application service with PostgreSQL configuration
  bengkelin-api:
    environment:
      # Database Configuration for PostgreSQL
      - DATABASE_DRIVER=postgres
      - DATABASE_NAME=${DATABASE_NAME:-bengkelin_db}
      - DATABASE_USERNAME=${DATABASE_USERNAME:-bengkelin_user}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-bengkelin_password}
      - DATABASE_HOST=postgres-db
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE:-disable}
      - POSTGRES_TIMEZONE=${POSTGRES_TIMEZONE:-Asia/Jakarta}
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # PostgreSQL Database
  postgres-db:
    image: postgres:15-alpine
    container_name: bengkelin-postgres-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DATABASE_NAME:-bengkelin_db}
      - POSTGRES_USER=${DATABASE_USERNAME:-bengkelin_user}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-bengkelin_password}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      - TZ=${POSTGRES_TIMEZONE:-Asia/Jakarta}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "5432:5432"
    networks:
      - bengkelin-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-bengkelin_user} -d ${DATABASE_NAME:-bengkelin_db}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c log_statement=all
      -c log_destination=stderr
      -c logging_collector=off

  # Remove MySQL service (commented out for reference)
  # db:
  #   profiles: ["mysql"]  # This prevents it from starting

volumes:
  postgres_data:
    driver: local

networks:
  bengkelin-network:
    driver: bridge